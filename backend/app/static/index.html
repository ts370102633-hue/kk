<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepAudio 声音工作室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;padding:24px}
h1{font-size:24px;font-weight:700;margin-bottom:8px}
.sub{color:#64748b;font-size:14px;margin-bottom:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
input,select,textarea{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:12px;font-size:14px;margin-bottom:14px}
textarea{min-height:80px;resize:vertical}
input[type=file]{padding:16px;border-style:dashed;background:#f8fafc}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{background:#0f172a;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn2{background:#0f172a;color:#fff;border:none;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer}
.btn-del{background:none;border:1px solid #e2e8f0;color:#94a3b8;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;margin-left:8px}
.btn-del:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca}
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600}
.badge-processing{background:#fef3c7;color:#92400e}
.badge-active{background:#d1fae5;color:#065f46}
.badge-failed{background:#fee2e2;color:#991b1b}
.badge-completed{background:#d1fae5;color:#065f46}
.badge-queued{background:#e0f2fe;color:#075985}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px;font-size:13px;color:#991b1b;margin-top:8px;white-space:pre-wrap}
.check{display:flex;align-items:flex-start;gap:8px;margin-bottom:14px;font-size:13px}
.check input{width:auto;margin:2px 0 0 0}
audio{width:100%;margin-top:10px}
.voice-item{border-bottom:1px solid #f1f5f9;padding:14px 0}
.voice-item:last-child{border:none}
.tab{display:inline-block;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-right:4px}
.tab.active{background:#0f172a;color:#fff}
.tab:not(.active){background:#f1f5f9;color:#64748b}
.hidden{display:none !important}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:999}
.loading-inner{background:#fff;padding:24px 32px;border-radius:16px;font-size:15px;font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div id="loading" class="loading hidden"><div class="loading-inner">⏳ 处理中，请稍候...</div></div>

<div style="display:flex;gap:8px;margin-bottom:20px">
  <div class="tab active" onclick="showTab('voices')">声音库</div>
  <div class="tab" onclick="showTab('speak')">文案朗读</div>
</div>

<div id="tab-voices">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div><h1>声音库</h1><div class="sub">上传录音或视频，克隆声音（数据存在浏览器，不会丢失）</div></div>
    <button class="btn2" onclick="showTab('new')">+ 上传新声音</button>
  </div>
  <div id="voice-list"></div>
</div>

<div id="tab-new" class="hidden">
  <h1>上传录音/视频，克隆声音</h1>
  <div class="sub">建议 5-30 秒清晰人声，安静环境</div>
  <div class="card" style="margin-top:16px">
    <label>声音名称 *</label>
    <input id="v-name" placeholder="例如：女主播A / 老板声音">
    <div class="row">
      <div><label>说话人</label><input id="v-speaker" placeholder="说话人姓名"></div>
      <div><label>部门</label><input id="v-dept" placeholder="例如：内容组"></div>
    </div>
    <label>音频/视频文件 *</label>
    <input type="file" id="v-file" accept="audio/*,video/*">
    <div class="check">
      <input type="checkbox" id="v-consent">
      <span>我确认该录音已获得本人或公司合法授权</span>
    </div>
    <div id="v-err" class="err hidden"></div>
    <button class="btn" id="v-btn" onclick="uploadVoice()">开始克隆</button>
  </div>
</div>

<div id="tab-speak" class="hidden">
  <h1>文案朗读</h1>
  <div class="sub">选择声音，输入文案，生成高质量语音</div>
  <div class="card" style="margin-top:16px">
    <label>选择声音 *</label>
    <select id="s-voice"><option value="">请选择...</option></select>
    <label>文案标题</label>
    <input id="s-title" placeholder="例如：产品介绍视频配音">
    <label>文案内容 *</label>
    <textarea id="s-text" placeholder="输入要朗读的文案..."></textarea>
    <div id="s-err" class="err hidden"></div>
    <button class="btn" id="s-btn" onclick="createTTS()">生成语音</button>
  </div>
  <div id="tts-result" class="hidden" style="margin-top:16px">
    <div class="card">
      <strong>生成结果</strong>
      <audio id="tts-audio" controls style="margin-top:10px"></audio>
    </div>
  </div>
</div>

<script>
const API = '';

// === localStorage 持久化 ===
function getVoices() { return JSON.parse(localStorage.getItem('voices') || '[]'); }
function saveVoices(v) { localStorage.setItem('voices', JSON.stringify(v)); }
function getJobs() { return JSON.parse(localStorage.getItem('jobs') || '[]'); }
function saveJobs(j) { localStorage.setItem('jobs', JSON.stringify(j)); }

function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

function showTab(name) {
  ['voices','new','speak'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==name);
  });
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.textContent.includes(
      name==='voices'?'声音库':name==='speak'?'文案朗读':'上传'
    ));
  });
  if(name==='voices') renderVoices();
  if(name==='speak') renderVoiceOptions();
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// === 声音库 ===
function renderVoices() {
  const voices = getVoices();
  const el = document.getElementById('voice-list');
  if(!voices.length) { el.innerHTML='<div class="card" style="text-align:center;color:#94a3b8">还没有声音，点击右上角上传</div>'; return; }
  el.innerHTML = voices.map(v => `
    <div class="card voice-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong style="font-size:16px">${esc(v.name)}</strong>
          <span style="color:#94a3b8;font-size:13px;margin-left:8px">${esc(v.speaker||'')} · ${esc(v.language||'ZH')}</span>
        </div>
        <div style="display:flex;align-items:center">
          <span class="badge badge-active">active</span>
          <button class="btn-del" onclick="deleteVoice('${v.id}')">删除</button>
        </div>
      </div>
      ${v.has_sample ? '<div style="color:#065f46;font-size:13px;margin-top:6px">✅ 克隆成功，去文案朗读使用</div>' : ''}
    </div>
  `).join('');
}

function renderVoiceOptions() {
  const voices = getVoices();
  const sel = document.getElementById('s-voice');
  sel.innerHTML = '<option value="">请选择...</option>' +
    voices.map(v => `<option value="${v.id}">${esc(v.name)}</option>`).join('');
}

// === 轮询任务状态 ===
async function pollTask(taskId, maxWait = 120000) {
  const start = Date.now();
  while (Date.now() - start < maxWait) {
    await new Promise(r => setTimeout(r, 2000));
    const res = await fetch(API + '/api/task/' + taskId);
    if (res.ok) {
      const data = await res.json();
      if (data.status === 'done') return data;
      if (data.status === 'error') throw new Error(data.error);
    }
  }
  throw new Error('请求超时，请重试');
}

// === 上传克隆 ===
async function uploadVoice() {
  const name = document.getElementById('v-name').value.trim();
  const file = document.getElementById('v-file').files[0];
  const consent = document.getElementById('v-consent').checked;
  const errEl = document.getElementById('v-err');
  errEl.classList.add('hidden');
  if(!name||!file||!consent) { errEl.textContent='请填写名称、选择文件并勾选授权'; errEl.classList.remove('hidden'); return; }

  const fd = new FormData();
  fd.append('file', file);

  const btn = document.getElementById('v-btn');
  btn.disabled = true; btn.textContent = '克隆中，请稍候...';
  showLoading();

  try {
    // 1. 启动任务
    const res = await fetch(API+'/api/clone', {method:'POST', body:fd});
    if(!res.ok) throw new Error(await res.text());
    const {task_id} = await res.json();

    // 2. 轮询结果
    const result = await pollTask(task_id);

    const voices = getVoices();
    voices.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name: name,
      speaker: document.getElementById('v-speaker').value,
      department: document.getElementById('v-dept').value,
      language: 'ZH',
      step_voice_id: result.step_voice_id,
      has_sample: true,
      created_at: new Date().toISOString(),
    });
    saveVoices(voices);
    showTab('voices');
  } catch(e) { errEl.textContent=e.message; errEl.classList.remove('hidden'); }
  finally { btn.disabled=false; btn.textContent='开始克隆'; hideLoading(); }
}

// === 文案朗读 ===
async function createTTS() {
  const voiceId = document.getElementById('s-voice').value;
  const text = document.getElementById('s-text').value.trim();
  const errEl = document.getElementById('s-err');
  errEl.classList.add('hidden');
  if(!voiceId||!text) { errEl.textContent='请选择声音并输入文案'; errEl.classList.remove('hidden'); return; }

  const voices = getVoices();
  const voice = voices.find(v => v.id === voiceId);
  if(!voice) { errEl.textContent='声音不存在'; errEl.classList.remove('hidden'); return; }

  const btn = document.getElementById('s-btn');
  btn.disabled = true; btn.textContent = '生成中，请稍候...';
  showLoading();

  try {
    // 1. 启动任务
    const res = await fetch(API+'/api/tts', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({step_voice_id: voice.step_voice_id, text: text})
    });
    if(!res.ok) throw new Error(await res.text());
    const {task_id} = await res.json();

    // 2. 轮询结果
    const result = await pollTask(task_id);

    // 保存任务记录
    const jobs = getJobs();
    jobs.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      title: document.getElementById('s-title').value || '未命名',
      voice_name: voice.name,
      text: text.slice(0, 50),
      created_at: new Date().toISOString(),
    });
    if(jobs.length > 20) jobs.pop();
    saveJobs(jobs);

    // 直接播放结果
    const audioEl = document.getElementById('tts-audio');
    audioEl.src = 'data:audio/mpeg;base64,' + result.audio;
    document.getElementById('tts-result').classList.remove('hidden');
    audioEl.play();
  } catch(e) {
    const msg = e.name === 'AbortError' ? '请求超时，请稍后重试' : e.message;
    errEl.textContent=msg; errEl.classList.remove('hidden');
  }
  finally { btn.disabled=false; btn.textContent='生成语音'; hideLoading(); }
}

// === 删除 ===
function deleteVoice(id) {
  if(!confirm('确定删除？')) return;
  const voices = getVoices().filter(v => v.id !== id);
  saveVoices(voices);
  renderVoices();
}

// 初始化
document.getElementById('loading').classList.add('hidden');
renderVoices();
</script>
</body>
</html>
