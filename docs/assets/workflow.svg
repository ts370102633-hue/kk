<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">StepAudio Voice Studio workflow</title>
  <desc id="desc">Authorized media enters a self-hosted FastAPI application, creates voice assets and TTS jobs, and stores audit records locally.</desc>
  <rect width="980" height="300" rx="18" fill="#F8FAFC"/>
  <rect x="38" y="58" width="170" height="92" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="123" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Authorized</text>
  <text x="123" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0F172A">source media</text>
  <text x="123" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">speaker consent required</text>

  <path d="M218 104H290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="40" width="190" height="128" rx="14" fill="#ECFEFF" stroke="#06B6D4"/>
  <text x="395" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0E7490">FastAPI app</text>
  <text x="395" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#155E75">auth, credits, admin</text>
  <text x="395" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#155E75">clone, ASR, TTS jobs</text>

  <path d="M500 104H572" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="582" y="36" width="170" height="58" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="667" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0F172A">StepAudio API</text>
  <rect x="582" y="118" width="170" height="58" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="667" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Provider hooks</text>

  <path d="M395 176V220" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="286" y="228" width="218" height="52" rx="14" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="395" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">SQLite audit records</text>

  <path d="M752 65H810" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M752 147H810" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="820" y="58" width="132" height="92" rx="14" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="886" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3730A3">Generated</text>
  <text x="886" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3730A3">audio</text>
  <text x="886" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">local file storage</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
